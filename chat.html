<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tin nhắn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        #chat-box { height: 350px; overflow-y: auto; background: #eee; padding: 10px; border-radius: 5px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 10px; background: white; max-width: 70%; }
        .me { background: #0d6efd; color: white; margin-left: auto; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AI Portal</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Trang chủ</a>
                <a class="nav-link" href="/post_job">Đăng tin</a>
                <a class="nav-link" href="/candidates">Ứng viên</a>
                <a class="nav-link active" href="/chat">Tin nhắn</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-success text-white">Chat trực tuyến</div>
            <div class="card-body">
                <div id="chat-box" class="mb-3 d-flex flex-column">
                    <div class="msg"><b>Nhà tuyển dụng:</b> Chào Henry, mình trao đổi về dự án AI nhé?</div>
                    <div class="msg me"><b>Henry247:</b> Dạ vâng ạ, em chào anh!</div>
                </div>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Nhập nội dung...">
                    <button class="btn btn-success">Gửi</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
