<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - VKU AI Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold" href="/">AI Portal</a>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container mt-3" style="max-width: 500px;">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm text-center" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center py-4" style="border-radius: 10px 10px 0 0;">
                        <h4 class="mb-0 fw-bold">Đăng nhập hệ thống</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên đăng nhập / Mã sinh viên</label>
                                <input type="text" class="form-control" name="username" placeholder="Ví dụ: henry247" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" class="form-control" name="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3 py-2 fw-bold">Đăng nhập</button>
                            
                            <div class="text-center">
                                <span class="text-muted">Chưa có tài khoản? </span>
                                <a href="/register" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
