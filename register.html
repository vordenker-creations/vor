<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - VKU AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background-color: #f8f9fa; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-4"><a class="navbar-brand fw-bold" href="/">VKU AI Portal</a></div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container mt-3" style="max-width: 700px;">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show text-center shadow-sm" role="alert">
              {{ message }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-header bg-success text-white text-center py-3" style="border-radius: 10px 10px 0 0;">
                        <h4 class="mb-0 fw-bold">Tạo tài khoản</h4>
                    </div>
                    <div class="card-body p-5">
                        
                        <form action="/register" method="POST" onsubmit="document.getElementById('btnSubmit').disabled = true; document.getElementById('btnSubmit').innerText = 'Đang xử lý...';">
                            
                            <h6 class="text-success fw-bold border-bottom pb-2 mb-3">Thông tin liên hệ</h6>
                            
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Địa chỉ Email</label>
                                <input type="email" class="form-control" name="email" placeholder="example@gmail.com" required>
                            </div>
                            
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Họ và tên</label>
                                    <input type="text" class="form-control" name="fullname" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Chức vụ</label>
                                    <input type="text" class="form-control" name="position" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Tên Công ty</label>
                                <input type="text" class="form-control" name="company" required>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Số điện thoại</label>
                                    <input type="tel" class="form-control" name="phone" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Địa chỉ</label>
                                    <input type="text" class="form-control" name="address" required>
                                </div>
                            </div>

                            <h6 class="text-success fw-bold border-bottom pb-2 mb-3">Tài khoản</h6>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Tên đăng nhập</label>
                                <input type="text" class="form-control" name="username" required>
                            </div>
                            <div class="row mb-4">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Mật khẩu</label>
                                    <input type="password" class="form-control" name="password" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Xác nhận</label>
                                    <input type="password" class="form-control" required>
                                </div>
                            </div>

                            <button id="btnSubmit" type="submit" class="btn btn-success w-100 py-2 fw-bold">Đăng ký ngay</button>
                            
                            <div class="text-center mt-3">
                                <span class="text-muted small">Đã có tài khoản? </span>
                                <a href="/login" class="text-decoration-none small fw-bold">Quay lại đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
