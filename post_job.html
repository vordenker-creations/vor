<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng tin mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AI Portal</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Trang chủ</a>
                <a class="nav-link active" href="/post_job">Đăng tin</a>
                <a class="nav-link" href="/candidates">Ứng viên</a>
                <a class="nav-link" href="/chat">Tin nhắn</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm mx-auto" style="max-width: 700px;">
            <div class="card-header bg-primary text-white"><h4>Tạo tin tuyển dụng mới</h4></div>
            <div class="card-body">
                <form action="/submit_job" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Tiêu đề công việc</label>
                        <input type="text" class="form-control" name="job_title" placeholder="Kỹ sư AI, Data Scientist..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Yêu cầu kỹ năng</label>
                        <input type="text" class="form-control" name="job_requirements" placeholder="Python, SQL, Machine Learning">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mô tả công việc</label>
                        <textarea class="form-control" name="job_description" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Đăng tin ngay</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
