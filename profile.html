<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ của tôi - VKU AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .profile-avatar { width: 150px; height: 150px; object-fit: cover; border-radius: 50%; border: 3px solid #0d6efd; margin: 0 auto; display: block;}
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">AI Portal</a>
            <a href="/" class="btn btn-outline-light btn-sm">Quay lại Trang chủ</a>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="container" style="max-width: 800px;">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show text-center shadow-sm" role="alert">
              {{ message }} <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-5">
                        <form action="/profile" method="POST" enctype="multipart/form-data">
                            
                            <div class="text-center mb-4">
                                {% if profile_data.avatar %}
                                    <img src="/static/uploads/avatars/{{ profile_data.avatar }}" class="profile-avatar mb-3">
                                {% else %}
                                    <img src="https://ui-avatars.com/api/?name={{ profile_data.fullname }}&background=e9ecef&color=495057&size=150" class="profile-avatar mb-3">
                                {% endif %}
                                <label for="avatar_upload" class="btn btn-sm btn-outline-primary fw-bold">📷 Chọn ảnh đại diện mới</label>
                                <input type="file" id="avatar_upload" name="avatar" accept="image/*" class="d-none">
                            </div>

                            <hr class="my-4">

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small text-muted">Tên đăng nhập 
                                        {% if not can_change %}
                                        <span class="text-danger">(Khóa {{ days_left }} ngày)</span>
                                        {% endif %}
                                    </label>
                                    <input type="text" class="form-control" name="username" value="{{ profile_data.username }}" {% if not can_change %}readonly{% endif %}>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold small text-muted">Email liên hệ</label>
                                    <input type="email" class="form-control" name="email" value="{{ profile_data.email }}">
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="form-label fw-bold small text-muted">Mô tả về bạn / Doanh nghiệp</label>
                                    <textarea class="form-control" name="bio" rows="4" placeholder="Giới thiệu thêm về môi trường làm việc...">{{ profile_data.bio if profile_data.bio else '' }}</textarea>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-primary float-end fw-bold px-4">Lưu cập nhật</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
